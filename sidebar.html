<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Synced Tab Groups</title>
    <link rel="stylesheet" href="sidebar.css" />
  </head>
  <body>
    <header class="sidebar-header">
    </header>

    <header class="topbar">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M10 10l3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input
          id="search-input"
          class="search-input"
          type="search"
          placeholder="Search tabs"
          autocomplete="off"
          spellcheck="false"
        />
      </div>
    </header>

    <div id="banner-error" class="banner hidden" role="alert"></div>

    <div id="loading" class="loading hidden" aria-live="polite">
      <span class="spinner" aria-hidden="true"></span>
      <span>Loading...</span>
    </div>

    <main id="root" class="root"></main>

    <footer class="footer">
      <a href="#" id="link-options" class="link-muted">Device name &amp; settings</a>
    </footer>

    <script src="sidebar.js"></script>
  </body>
</html>
